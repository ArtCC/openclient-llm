name: CI

on:
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-ios:
    name: Build & Test (iOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Create Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << 'EOF'
          VOTICE_API_KEY = 
          VOTICE_API_SECRET = 
          VOTICE_APP_ID = 
          EOF

      - name: Resolve simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime in sorted(data['devices'], reverse=True):
              if 'iOS' in runtime:
                  for d in data['devices'][runtime]:
                      if 'iPhone' in d['name']:
                          print(d['udid']); sys.exit(0)
          sys.exit(1)")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & Test
        run: |
          xcodebuild test \
            -project openclient-llm.xcodeproj \
            -scheme openclient-llm \
            -destination 'id=${{ steps.sim.outputs.udid }}' \
            -resultBundlePath TestResults.xcresult \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 120 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee xcodebuild.log | xcpretty
          RESULT=${PIPESTATUS[0]}
          if [ $RESULT -ne 0 ]; then
            echo "::group::xcodebuild raw output (last 200 lines)"
            tail -200 xcodebuild.log
            echo "::endgroup::"
            # Check if all tests actually passed despite exit code
            if grep -q "Executed.*with 0 failures" xcodebuild.log; then
              echo "⚠️ xcodebuild exited with $RESULT but all tests passed. Treating as success."
              exit 0
            fi
            exit $RESULT
          fi

      - name: Upload raw log on failure
        if: failure()
        run: |
          echo "::group::xcodebuild raw output (last 200 lines)"
          tail -200 xcodebuild.log
          echo "::endgroup::"

  build-macos:
    name: Build (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Create Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << 'EOF'
          VOTICE_API_KEY = 
          VOTICE_API_SECRET = 
          VOTICE_APP_ID = 
          EOF

      - name: Build
        run: |
          xcodebuild build \
            -project openclient-llm.xcodeproj \
            -scheme openclient-llm-macOS \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}