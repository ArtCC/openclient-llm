name: macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-dmg:
    name: Build, Sign & Notarize macOS DMG
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from CHANGELOG
        id: changelog
        run: |
          python3 - << 'PYEOF'
          import re, sys

          content = open('CHANGELOG.md').read()

          m = re.search(r'## \[([\d+\.\d+\.\d+][^\]]*)\]', content)
          if not m:
              print('::error::No version found in CHANGELOG.md')
              sys.exit(1)
          version = m.group(1)

          m_notes = re.search(
              r'## \[[^\]]+\][^\n]*\n(.*?)(?=\n## \[|\Z)',
              content, re.DOTALL
          )
          notes = m_notes.group(1).strip() if m_notes else ''

          with open('RELEASE_VERSION', 'w') as f:
              f.write(version)
          with open('RELEASE_NOTES.md', 'w') as f:
              f.write(notes)

          print(f'Version: {version}')
          PYEOF
          echo "version=$(cat RELEASE_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create Secrets.xcconfig
        env:
          VOTICE_API_KEY: ${{ secrets.VOTICE_API_KEY }}
          VOTICE_API_SECRET: ${{ secrets.VOTICE_API_SECRET }}
          VOTICE_APP_ID: ${{ secrets.VOTICE_APP_ID }}
        run: |
          cat > Secrets.xcconfig << 'EOF'
          VOTICE_API_KEY = $(VOTICE_API_KEY_PLACEHOLDER)
          VOTICE_API_SECRET = $(VOTICE_API_SECRET_PLACEHOLDER)
          VOTICE_APP_ID = $(VOTICE_APP_ID_PLACEHOLDER)
          EOF
          sed -i '' \
            -e "s|\$(VOTICE_API_KEY_PLACEHOLDER)|$VOTICE_API_KEY|g" \
            -e "s|\$(VOTICE_API_SECRET_PLACEHOLDER)|$VOTICE_API_SECRET|g" \
            -e "s|\$(VOTICE_APP_ID_PLACEHOLDER)|$VOTICE_APP_ID|g" \
            Secrets.xcconfig

      - name: Import Developer ID certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set up App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode \
            > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Install provisioning profile
        env:
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$PP_DIR/OpenClient.provisionprofile"

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>Q4X55987WE</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.artcc.openclient-llm</key>
              <string>OpenClient</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive macOS app
        run: |
          xcodebuild archive \
            -project openclient-llm.xcodeproj \
            -scheme openclient-llm-macOS \
            -destination 'platform=macOS' \
            -archivePath "$RUNNER_TEMP/openclient-llm.xcarchive" \
            DEVELOPMENT_TEAM=Q4X55987WE \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=OpenClient \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            2>&1 | tee xcodebuild.log | xcpretty
          RESULT=${PIPESTATUS[0]}
          if [ $RESULT -ne 0 ]; then
            echo "::group::xcodebuild raw output (last 300 lines)"
            tail -300 xcodebuild.log
            echo "::endgroup::"
            exit $RESULT
          fi

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/openclient-llm.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            2>&1 | xcpretty && exit ${PIPESTATUS[0]}

      - name: Create DMG
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/export" -name "*.app" -maxdepth 1 | head -1)
          DMG_PATH="$RUNNER_TEMP/OpenClient-LLM-${{ steps.changelog.outputs.version }}.dmg"
          STAGING="$RUNNER_TEMP/dmg_staging"

          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "OpenClient LLM" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 30m

      - name: Staple notarization ticket
        run: xcrun stapler staple "$DMG_PATH"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.changelog.outputs.version }}-macos"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            "$DMG_PATH"

      - name: Clean up
        if: always()
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 || true