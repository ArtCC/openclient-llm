name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create Release
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and release notes
        id: changelog
        run: |
          python3 - << 'PYEOF'
          import re, sys

          content = open('CHANGELOG.md').read()

          # Version: first ## [X.Y.Z]
          m = re.search(r'## \[(\d+\.\d+\.\d+)\]', content)
          if not m:
              print('::error::No version found in CHANGELOG.md')
              sys.exit(1)
          version = m.group(1)

          # Notes: block between first ## [X.Y.Z] header and the next ## [
          m_notes = re.search(
              r'## \[\d+\.\d+\.\d+\][^\n]*\n(.*?)(?=\n## \[|\Z)',
              content, re.DOTALL
          )
          notes = m_notes.group(1).strip() if m_notes else ''

          with open('RELEASE_VERSION', 'w') as f:
              f.write(version)
          with open('RELEASE_NOTES.md', 'w') as f:
              f.write(notes)

          print(f'Version: {version}')
          PYEOF
          echo "version=$(cat RELEASE_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.changelog.outputs.version }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

      - name: Create tag
        run: |
          TAG="v${{ steps.changelog.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.changelog.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md
